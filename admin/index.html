<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">
                📊 <span>Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                👥 <span>Usuarios</span>
            </a>
            <a href="fleet.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                🚕 <span>Flota</span>
            </a>
            <a href="campaigns.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📢 <span>Campañas</span>
            </a>
            <a href="payouts.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                💸 <span>Pagos</span>
            </a>
        </nav>

        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white text-sm font-bold">A</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Admin</p>
                    <p class="text-xs text-gray-500">Administrador</p>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <h1 class="text-xl lg:text-2xl font-bold text-[#003366] mb-6">📊 Dashboard</h1>

        <div id="stats-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 mb-6">
            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">Usuarios Totales</p>
                <p class="text-2xl lg:text-3xl font-bold text-[#003366] mt-2" id="total-users">-</p>
                <p class="text-xs text-gray-500 mt-2" id="users-breakdown"></p>
            </div>
            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">Vehículos Activos</p>
                <p class="text-2xl lg:text-3xl font-bold text-[#003366] mt-2" id="total-vehicles">-</p>
                <p class="text-xs text-green-600 mt-2" id="vehicles-change"></p>
            </div>
            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">Campañas Activas</p>
                <p class="text-2xl lg:text-3xl font-bold text-[#003366] mt-2" id="total-campaigns">-</p>
                <p class="text-xs text-gray-500 mt-2" id="campaigns-paused"></p>
            </div>
            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">Escaneos Mes</p>
                <p class="text-2xl lg:text-3xl font-bold text-[#FFB800] mt-2" id="scans-month">-</p>
                <p class="text-xs text-green-600 mt-2" id="scans-change"></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-700 mb-4 text-sm lg:text-base">Escaneos por Día</h3>
                <div class="h-48 lg:h-64">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-700 mb-4 text-sm lg:text-base">Escaneos Mensuales</h3>
                <div class="h-48 lg:h-64">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-700 mb-4 text-sm lg:text-base">Usuarios Recientes</h3>
            <div class="space-y-3" id="recent-users"></div>
        </div>

    </main>

</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../advertiser/js/mobile.js"></script>
<script>
async function init() {
    try {
        const data = await api('admin.stats');

        document.getElementById('total-users').textContent = data.totalUsers;
        document.getElementById('users-breakdown').textContent = `${data.totalAdvertisers} anunciantes, ${data.totalDrivers} taxistas`;
        document.getElementById('total-vehicles').textContent = data.totalVehicles;
        document.getElementById('vehicles-change').textContent = `↑ ${data.vehiclesThisMonth} este mes`;
        document.getElementById('total-campaigns').textContent = data.totalCampaigns;
        document.getElementById('campaigns-paused').textContent = `${data.pausedCampaigns} en pausa`;
        document.getElementById('scans-month').textContent = data.scansMonth.toLocaleString();
        document.getElementById('scans-change').textContent = `${data.scansChange >= 0 ? '↑' : '↓'} ${Math.abs(data.scansChange)}% vs mes anterior`;

        const dailyLabels = data.daily.map(d => d.date);
        const dailyValues = data.daily.map(d => d.count);

        new Chart(document.getElementById('dailyChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: dailyLabels.length ? dailyLabels.slice(-20) : ['Sin datos'],
                datasets: [{
                    label: 'Escaneos',
                    data: dailyValues.length ? dailyValues.slice(-20) : [0],
                    borderColor: '#003366',
                    backgroundColor: 'rgba(0, 51, 102, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const monthlyCounts = [0, 0, 0, 0, 0, 0];
        data.daily.forEach(d => {
            const month = new Date(d.date).getMonth();
            if (month >= 0 && month < 6) monthlyCounts[month] += d.count;
        });

        new Chart(document.getElementById('revenueChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'],
                datasets: [{
                    label: 'Escaneos',
                    data: monthlyCounts,
                    backgroundColor: '#FFB800',
                    borderRadius: 6
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const recentContainer = document.getElementById('recent-users');
        if (data.recentUsers && data.recentUsers.length > 0) {
            recentContainer.innerHTML = data.recentUsers.map(u => {
                const initials = (u.name || u.email)[0].toUpperCase();
                const roleLabels = { admin: 'Admin', advertiser: 'Anunciante', publisher: 'Taxista' };
                const roleColors = { admin: 'red', advertiser: 'purple', publisher: 'green' };
                const color = roleColors[u.role] || 'gray';
                return `<div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-${color}-100 rounded-full flex items-center justify-center text-${color}-600 text-sm font-bold">${initials}</div>
                        <div>
                            <p class="font-medium text-sm">${u.name || u.email}</p>
                            <p class="text-xs text-gray-500">${u.email}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="bg-${color}-100 text-${color}-700 px-2 py-1 rounded text-xs font-bold">${roleLabels[u.role]}</span>
                        <p class="text-xs text-gray-400 mt-1">${new Date(u.created_at).toLocaleDateString()}</p>
                    </div>
                </div>`;
            }).join('');
        } else {
            recentContainer.innerHTML = '<p class="text-sm text-gray-500 p-3">No hay usuarios recientes</p>';
        }
    } catch (err) {
        toast('Error al cargar dashboard: ' + err.message, 'error');
    }
}
init();
</script>
</body>
</html>
