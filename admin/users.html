<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📊 <span>Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">
                👥 <span>Usuarios</span>
            </a>
            <a href="fleet.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                🚕 <span>Flota</span>
            </a>
            <a href="campaigns.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📢 <span>Campañas</span>
            </a>
            <a href="payouts.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                💸 <span>Pagos</span>
            </a>
        </nav>

        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white text-sm font-bold">A</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Admin</p>
                    <p class="text-xs text-gray-500">Administrador</p>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl lg:text-2xl font-bold text-[#003366]">👥 Usuarios</h1>
            <button onclick="showCreateModal()" class="bg-[#003366] text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-950 transition whitespace-nowrap">+ Nuevo Usuario</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 mb-6 overflow-x-auto">
            <div class="flex border-b border-gray-200 min-w-0">
                <button onclick="switchTab('advertisers')" id="tab-advertisers" class="px-4 lg:px-6 py-3 text-sm font-medium border-b-2 border-[#003366] text-[#003366] whitespace-nowrap">Anunciantes <span id="count-advertisers" class="text-xs ml-1">(0)</span></button>
                <button onclick="switchTab('drivers')" id="tab-drivers" class="px-4 lg:px-6 py-3 text-sm font-medium text-gray-500 hover:text-[#003366] whitespace-nowrap">Taxistas <span id="count-drivers" class="text-xs ml-1">(0)</span></button>
                <button onclick="switchTab('admins')" id="tab-admins" class="px-4 lg:px-6 py-3 text-sm font-medium text-gray-500 hover:text-[#003366] whitespace-nowrap">Admins <span id="count-admins" class="text-xs ml-1">(0)</span></button>
            </div>
        </div>

        <div id="content-advertisers" class="tab-content block">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
                <table class="w-full text-left min-w-[500px]">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold border-b">
                            <th class="p-4">Nombre</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Estado</th>
                            <th class="p-4">Registrado</th>
                            <th class="p-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-advertisers" class="text-sm divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <div id="content-drivers" class="tab-content hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
                <table class="w-full text-left min-w-[500px]">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold border-b">
                            <th class="p-4">Nombre</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Estado</th>
                            <th class="p-4">Registrado</th>
                            <th class="p-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-drivers" class="text-sm divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <div id="content-admins" class="tab-content hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
                <table class="w-full text-left min-w-[500px]">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold border-b">
                            <th class="p-4">Nombre</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Estado</th>
                            <th class="p-4">Registrado</th>
                            <th class="p-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-admins" class="text-sm divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </main>

</div>

<div id="create-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-bold text-lg mb-4">Nuevo Usuario</h3>
        <form id="create-form" class="space-y-4">
            <input type="text" id="new-name" placeholder="Nombre" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <input type="email" id="new-email" placeholder="Email" required class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <input type="password" id="new-password" placeholder="Contraseña" required class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <select id="new-role" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
                <option value="advertiser">Anunciante</option>
                <option value="publisher">Taxista</option>
                <option value="admin">Admin</option>
            </select>
            <div class="flex gap-3">
                <button type="button" onclick="closeCreateModal()" class="flex-1 py-3 border rounded-xl text-sm font-medium">Cancelar</button>
                <button type="submit" class="flex-1 bg-[#003366] text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-950">Crear</button>
            </div>
        </form>
    </div>
</div>

<div id="edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-bold text-lg mb-4">Editar Usuario</h3>
        <form id="edit-form" class="space-y-4">
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" placeholder="Nombre" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <input type="email" id="edit-email" placeholder="Email" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <select id="edit-role" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
                <option value="advertiser">Anunciante</option>
                <option value="publisher">Taxista</option>
                <option value="admin">Admin</option>
            </select>
            <div class="flex gap-3">
                <button type="button" onclick="closeEditModal()" class="flex-1 py-3 border rounded-xl text-sm font-medium">Cancelar</button>
                <button type="submit" class="flex-1 bg-[#003366] text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-950">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../advertiser/js/mobile.js"></script>
<script>
let allUsers = [];

async function loadUsers() {
    try {
        const data = await api('admin.users.list');
        allUsers = data.users || [];
        renderTab('advertisers');
        renderTab('drivers');
        renderTab('admins');
    } catch (err) {
        console.error('Error loading users:', err);
    }
}

function renderTab(role) {
    const roleMap = { advertisers: 'advertiser', drivers: 'publisher', admins: 'admin' };
    const dbRole = roleMap[role];
    const users = allUsers.filter(u => u.role === dbRole);
    document.getElementById(`count-${role}`).textContent = `(${users.length})`;
    const tbody = document.getElementById(`tbody-${role}`);
    if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-400">No hay usuarios</td></tr>';
        return;
    }
    tbody.innerHTML = users.map(u => `
        <tr class="hover:bg-gray-50">
            <td class="p-4 font-medium">${u.name || '-'}</td>
            <td class="p-4 text-gray-500 break-all">${u.email}</td>
            <td class="p-4"><span class="${u.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} px-2 py-1 rounded-full text-xs font-bold">${u.status === 'active' ? 'ACTIVO' : 'INACTIVO'}</span></td>
            <td class="p-4 text-gray-500 whitespace-nowrap">${new Date(u.created_at).toLocaleDateString('es-PA')}</td>
            <td class="p-4 text-right whitespace-nowrap">
                <button onclick="editUser(${u.id})" class="text-[#003366] hover:underline text-xs font-medium mr-2">Editar</button>
                <button onclick="toggleUser(${u.id})" class="${u.status === 'active' ? 'text-red-600' : 'text-green-600'} hover:underline text-xs font-medium">${u.status === 'active' ? 'Desactivar' : 'Activar'}</button>
            </td>
        </tr>
    `).join('');
}

function switchTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById('content-' + tabName).classList.remove('hidden');
    document.querySelectorAll('button[id^="tab-"]').forEach(el => {
        el.classList.remove('border-b-2', 'border-[#003366]', 'text-[#003366]');
        el.classList.add('text-gray-500');
    });
    document.getElementById('tab-' + tabName).classList.add('border-b-2', 'border-[#003366]', 'text-[#003366]');
}

function showCreateModal() { document.getElementById('create-modal').classList.remove('hidden'); }
function closeCreateModal() { document.getElementById('create-modal').classList.add('hidden'); }
function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }

document.getElementById('create-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Creando...';
    try {
        await api('admin.users.create', {
            email: document.getElementById('new-email').value,
            password: document.getElementById('new-password').value,
            name: document.getElementById('new-name').value,
            role: document.getElementById('new-role').value
        });
        closeCreateModal(); this.reset(); loadUsers();
        toast('Usuario creado', 'success');
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Crear'; }
});

async function editUser(id) {
    const u = allUsers.find(x => x.id === id);
    if (!u) return;
    document.getElementById('edit-id').value = u.id;
    document.getElementById('edit-name').value = u.name || '';
    document.getElementById('edit-email').value = u.email;
    document.getElementById('edit-role').value = u.role;
    document.getElementById('edit-modal').classList.remove('hidden');
}

document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Guardando...';
    try {
        await api('admin.users.update', {
            id: parseInt(document.getElementById('edit-id').value),
            name: document.getElementById('edit-name').value,
            email: document.getElementById('edit-email').value,
            role: document.getElementById('edit-role').value
        });
        closeEditModal(); loadUsers();
        toast('Usuario actualizado', 'success');
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Guardar'; }
});

async function toggleUser(id) {
    const confirmed = await customConfirm('¿Cambiar estado de este usuario?');
    if (!confirmed) return;
    try {
        const data = await api('admin.users.toggleStatus', { id });
        loadUsers();
        toast(`Usuario ${data.status === 'active' ? 'activado' : 'desactivado'}`, 'success');
    } catch (err) { toast(err.message, 'error'); }
}

loadUsers();
</script>
</body>
</html>
