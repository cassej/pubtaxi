<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campañas | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">📊 <span>Dashboard</span></a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">👥 <span>Usuarios</span></a>
            <a href="fleet.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">🚕 <span>Flota</span></a>
            <a href="campaigns.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">📢 <span>Campañas</span></a>
            <a href="payouts.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">💸 <span>Pagos</span></a>
        </nav>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white text-sm font-bold">A</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Admin</p>
                    <p class="text-xs text-gray-500">Administrador</p>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl lg:text-2xl font-bold text-[#003366]">📢 Campañas</h1>
            <button onclick="showCreateModal()" class="bg-[#003366] text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-950 transition whitespace-nowrap">+ Nueva Campaña</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
            <table class="w-full text-left min-w-[700px]">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold border-b">
                        <th class="p-4">Nombre</th>
                        <th class="p-4">Anunciante</th>
                        <th class="p-4">Vehículos</th>
                        <th class="p-4 text-center">Escaneos (30d)</th>
                        <th class="p-4">Estado</th>
                        <th class="p-4">Creada</th>
                        <th class="p-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="campaigns-tbody" class="text-sm divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </main>

</div>

<div id="create-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-bold text-lg mb-4">Nueva Campaña</h3>
        <form id="create-form" class="space-y-4">
            <select id="new-advertiser" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]" required>
                <option value="">Seleccionar anunciante</option>
            </select>
            <input type="text" id="new-name" placeholder="Nombre de la campaña" required class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <select id="new-status" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
                <option value="active">Activa</option>
                <option value="inactive">Inactiva</option>
            </select>
            <div class="flex gap-3">
                <button type="button" onclick="closeCreateModal()" class="flex-1 py-3 border rounded-xl text-sm font-medium">Cancelar</button>
                <button type="submit" class="flex-1 bg-[#003366] text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-950">Crear</button>
            </div>
        </form>
    </div>
</div>

<div id="edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-bold text-lg mb-4">Editar Campaña</h3>
        <form id="edit-form" class="space-y-4">
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" placeholder="Nombre" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <select id="edit-status" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
                <option value="active">Activa</option>
                <option value="inactive">Inactiva</option>
            </select>
            <div class="flex gap-3">
                <button type="button" onclick="closeEditModal()" class="flex-1 py-3 border rounded-xl text-sm font-medium">Cancelar</button>
                <button type="submit" class="flex-1 bg-[#003366] text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-950">Guardar</button>
            </div>
        </form>
    </div>
</div>

<div id="qr-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-2xl mx-4 max-h-[85vh] flex flex-col">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-lg" id="qr-modal-title">Códigos QR</h3>
            <button onclick="closeQrModal()" class="p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto min-h-0">
            <div id="qr-list" class="space-y-2 mb-4"></div>

            <div class="border-t pt-4">
                <h4 class="font-bold text-sm text-gray-700 mb-3">Asignar nuevo QR</h4>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
                    <select id="qr-vehicle" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
                        <option value="">Seleccionar vehículo</option>
                    </select>
                    <select id="qr-position" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
                        <option value="">Posición</option>
                        <option value="Apoyacabezas Izquierdo">Apoyacabezas Izquierdo</option>
                        <option value="Apoyacabezas Derecho">Apoyacabezas Derecho</option>
                        <option value="Salpicadero">Salpicadero</option>
                        <option value="Asiento Trasero">Asiento Trasero</option>
                    </select>
                    <button onclick="assignQr()" class="bg-[#003366] text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-950 transition">Generar QR</button>
                </div>
                <p id="qr-result" class="text-xs text-gray-500 hidden"></p>
            </div>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../advertiser/js/mobile.js"></script>
<script>
let allCampaigns = [];
let advertisers = [];
let qrCampaignId = null;

async function load() {
    await Promise.all([loadCampaigns(), loadAdvertisers()]);
}

async function loadCampaigns() {
    try {
        const data = await api('admin.campaigns.list');
        allCampaigns = data.campaigns || [];
        renderCampaigns();
    } catch (err) { toast(err.message, 'error'); }
}

async function loadAdvertisers() {
    try {
        const data = await api('admin.users.list');
        advertisers = (data.users || []).filter(u => u.role === 'advertiser');
        populateSelects();
    } catch (err) { /* ignore */ }
}

function populateSelects() {
    const html = advertisers.map(a => `<option value="${a.id}">${a.name || a.email} (${a.email})</option>`).join('');
    document.getElementById('new-advertiser').innerHTML = '<option value="">Seleccionar anunciante</option>' + html;
}

function renderCampaigns() {
    const tbody = document.getElementById('campaigns-tbody');
    if (allCampaigns.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-gray-400">No hay campañas</td></tr>';
        return;
    }
    tbody.innerHTML = allCampaigns.map(c => `
        <tr class="hover:bg-gray-50">
            <td class="p-4 font-medium">${c.name}</td>
            <td class="p-4">${c.advertiser_name || '-'}</td>
            <td class="p-4">${c.vehicle_count || 0}</td>
            <td class="p-4 text-center font-bold">${c.scans_month || 0}</td>
            <td class="p-4"><span class="${c.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} px-2 py-1 rounded-full text-xs font-bold">${(c.status || 'active').toUpperCase()}</span></td>
            <td class="p-4 text-gray-500 whitespace-nowrap">${c.created_at ? new Date(c.created_at).toLocaleDateString('es-PA') : '-'}</td>
            <td class="p-4 text-right whitespace-nowrap">
                <button onclick="editCampaign(${c.id})" class="text-[#003366] hover:underline text-xs font-medium mr-2">Editar</button>
                <button onclick="showQrModal(${c.id})" class="text-[#FFB800] hover:underline text-xs font-medium">QR</button>
            </td>
        </tr>
    `).join('');
}

function showCreateModal() { document.getElementById('create-modal').classList.remove('hidden'); }
function closeCreateModal() { document.getElementById('create-modal').classList.add('hidden'); }
function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }
function closeQrModal() {
    document.getElementById('qr-modal').classList.add('hidden');
    qrCampaignId = null;
}

document.getElementById('create-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Creando...';
    try {
        await api('admin.campaigns.create', {
            advertiser_id: parseInt(document.getElementById('new-advertiser').value),
            name: document.getElementById('new-name').value,
            status: document.getElementById('new-status').value
        });
        closeCreateModal(); this.reset(); loadCampaigns();
        toast('Campaña creada', 'success');
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Crear'; }
});

async function editCampaign(id) {
    const c = allCampaigns.find(x => x.id === id);
    if (!c) return;
    document.getElementById('edit-id').value = c.id;
    document.getElementById('edit-name').value = c.name;
    document.getElementById('edit-status').value = c.status || 'active';
    document.getElementById('edit-modal').classList.remove('hidden');
}

document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Guardando...';
    try {
        await api('admin.campaigns.update', {
            id: parseInt(document.getElementById('edit-id').value),
            name: document.getElementById('edit-name').value,
            status: document.getElementById('edit-status').value
        });
        closeEditModal(); loadCampaigns();
        toast('Campaña actualizada', 'success');
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Guardar'; }
});

async function showQrModal(campaignId) {
    qrCampaignId = campaignId;
    const c = allCampaigns.find(x => x.id === campaignId);
    document.getElementById('qr-modal-title').textContent = `QR — ${c ? c.name : ''}`;
    document.getElementById('qr-result').classList.add('hidden');

    await Promise.all([loadQrCodes(campaignId), loadQrVehicles()]);
    document.getElementById('qr-modal').classList.remove('hidden');
}

async function loadQrCodes(campaignId) {
    try {
        const data = await api('admin.campaigns.qrCodes', { campaign_id: campaignId });
        const container = document.getElementById('qr-list');
        const codes = data.codes || [];
        if (codes.length === 0) {
            container.innerHTML = '<p class="text-sm text-gray-400 text-center py-6">No hay códigos QR asignados todavía</p>';
            return;
        }
        container.innerHTML = codes.map(q => `
            <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl text-sm">
                <div class="flex items-center gap-3 min-w-0">
                    <span class="font-bold text-[#003366]">${q.plate_number || '#' + q.vehicle_id}</span>
                    <span class="text-gray-500">${q.model || ''}</span>
                    <span class="text-gray-400 text-xs">${q.position || '—'}</span>
                    <span class="text-[10px] font-mono bg-gray-200 px-2 py-0.5 rounded">${toBase62(q.id)}</span>
                </div>
                <span class="text-xs text-gray-400">${new Date(q.created_at).toLocaleDateString('es-PA')}</span>
            </div>
        `).join('');
    } catch (err) { toast(err.message, 'error'); }
}

function toBase62(n) {
    const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
    if (n === 0) return '0';
    let result = '';
    while (n > 0) {
        result = chars[n % 62] + result;
        n = Math.floor(n / 62);
    }
    return result;
}

async function loadQrVehicles() {
    try {
        const data = await api('vehicle.list');
        const select = document.getElementById('qr-vehicle');
        select.innerHTML = '<option value="">Seleccionar vehículo</option>' +
            (data.vehicles || []).map(v =>
                `<option value="${v.id}">${v.plate_number || '#' + v.id} — ${v.model || ''} (${v.publisher_name || ''})</option>`
            ).join('');
    } catch (err) { /* ignore */ }
}

async function assignQr() {
    const vehicleId = parseInt(document.getElementById('qr-vehicle').value);
    const position = document.getElementById('qr-position').value;
    if (!vehicleId || !position) { toast('Selecciona vehículo y posición', 'error'); return; }
    if (!qrCampaignId) return;

    try {
        const data = await api('qr.generate', {
            vehicle_id: vehicleId,
            campaign_id: qrCampaignId,
            position
        });
        const result = document.getElementById('qr-result');
        result.classList.remove('hidden');
        result.innerHTML = `QR generado: <span class="font-mono font-bold">${data.shortId}</span> → <span class="text-[10px]">pubtaxi.lat/r/${data.shortId}</span>`;
        await loadQrCodes(qrCampaignId);
        loadCampaigns();
        toast('QR asignado', 'success');
    } catch (err) { toast(err.message, 'error'); }
}

load();
</script>
</body>
</html>
