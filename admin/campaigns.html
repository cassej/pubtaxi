<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campañas | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📊 <span>Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                👥 <span>Usuarios</span>
            </a>
            <a href="fleet.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                🚕 <span>Flota</span>
            </a>
            <a href="campaigns.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">
                📢 <span>Campañas</span>
            </a>
            <a href="payouts.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                💸 <span>Pagos</span>
            </a>
        </nav>

        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white text-sm font-bold">A</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Admin</p>
                    <p class="text-xs text-gray-500">Administrador</p>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <h1 class="text-xl lg:text-2xl font-bold text-[#003366] mb-6">📢 Campañas Activas</h1>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold border-b">
                        <th class="p-4">Empresa</th>
                        <th class="p-4">Vehículos</th>
                        <th class="p-4">Escaneos Mes</th>
                        <th class="p-4">URL</th>
                        <th class="p-4">Estado</th>
                    </tr>
                </thead>
                <tbody id="campaigns-tbody" class="text-sm divide-y divide-gray-100"></tbody>
            </table>
        </div>

    </main>

</div>

<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../advertiser/js/mobile.js"></script>
<script>
async function loadCampaigns() {
    try {
        const data = await api('admin.campaigns.list');
        const tbody = document.getElementById('campaigns-tbody');
        if (!data.campaigns || data.campaigns.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-400">No hay campañas</td></tr>';
            return;
        }
        tbody.innerHTML = data.campaigns.map(c => `
            <tr class="hover:bg-gray-50">
                <td class="p-4 font-medium">${c.name || 'Sin nombre'}<br><span class="text-xs text-gray-400">${c.advertiser_name || ''}</span></td>
                <td class="p-4">${c.vehicle_count || 0}</td>
                <td class="p-4 font-bold text-[#003366]">${c.scans_month || 0}</td>
                <td class="p-4 text-xs text-gray-500 max-w-[200px] truncate">${c.target_url || '—'}</td>
                <td class="p-4"><span class="${c.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'} px-2 py-1 rounded-full text-xs font-bold">${(c.status || '').toUpperCase()}</span></td>
            </tr>
        `).join('');
    } catch (err) {
        console.error('Error loading campaigns:', err);
    }
}
loadCampaigns();
</script>
</body>
</html>
