<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flota | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">📊 <span>Dashboard</span></a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">👥 <span>Usuarios</span></a>
            <a href="fleet.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">🚕 <span>Flota</span></a>
            <a href="campaigns.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">📢 <span>Campañas</span></a>
            <a href="payouts.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">💸 <span>Pagos</span></a>
        </nav>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white text-sm font-bold">A</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Admin</p>
                    <p class="text-xs text-gray-500">Administrador</p>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl lg:text-2xl font-bold text-[#003366]">🚕 Flota</h1>
            <button onclick="showCreateModal()" class="bg-[#003366] text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-950 transition whitespace-nowrap">+ Añadir Vehículo</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
            <table class="w-full text-left min-w-[600px]">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold border-b">
                        <th class="p-4">Placa</th>
                        <th class="p-4">Modelo</th>
                        <th class="p-4">Taxista</th>
                        <th class="p-4">Email</th>
                        <th class="p-4">Estado</th>
                        <th class="p-4 text-center">QR</th>
                        <th class="p-4 text-center">Escaneos (30d)</th>
                        <th class="p-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="vehicles-tbody" class="text-sm divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </main>

</div>

<div id="create-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-bold text-lg mb-4">Añadir Vehículo</h3>
        <form id="create-form" class="space-y-4">
            <select id="new-publisher" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]" required>
                <option value="">Seleccionar taxista</option>
            </select>
            <input type="text" id="new-plate" placeholder="Placa" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <input type="text" id="new-model" placeholder="Modelo" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <div class="flex gap-3">
                <button type="button" onclick="closeCreateModal()" class="flex-1 py-3 border rounded-xl text-sm font-medium">Cancelar</button>
                <button type="submit" class="flex-1 bg-[#003366] text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-950">Añadir</button>
            </div>
        </form>
    </div>
</div>

<div id="edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-bold text-lg mb-4">Editar Vehículo</h3>
        <form id="edit-form" class="space-y-4">
            <input type="hidden" id="edit-id">
            <select id="edit-publisher" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
                <option value="">Seleccionar taxista</option>
            </select>
            <input type="text" id="edit-plate" placeholder="Placa" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <input type="text" id="edit-model" placeholder="Modelo" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
            <select id="edit-status" class="w-full p-3 border rounded-xl text-sm outline-none focus:border-[#003366]">
                <option value="active">Activo</option>
                <option value="inactive">Inactivo</option>
            </select>
            <div class="flex gap-3">
                <button type="button" onclick="closeEditModal()" class="flex-1 py-3 border rounded-xl text-sm font-medium">Cancelar</button>
                <button type="submit" class="flex-1 bg-[#003366] text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-950">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../advertiser/js/mobile.js"></script>
<script>
let allVehicles = [];
let publishers = [];

async function load() {
    await Promise.all([loadVehicles(), loadPublishers()]);
}

async function loadVehicles() {
    try {
        const data = await api('admin.vehicles.list');
        allVehicles = data.vehicles || [];
        renderVehicles();
    } catch (err) { toast(err.message, 'error'); }
}

async function loadPublishers() {
    try {
        const data = await api('admin.users.list');
        publishers = (data.users || []).filter(u => u.role === 'publisher');
        populateSelects();
    } catch (err) { /* ignore */ }
}

function populateSelects() {
    const html = publishers.map(p => `<option value="${p.id}">${p.name || p.email} (${p.email})</option>`).join('');
    document.getElementById('new-publisher').innerHTML = '<option value="">Seleccionar taxista</option>' + html;
    document.getElementById('edit-publisher').innerHTML = '<option value="">Seleccionar taxista</option>' + html;
}

function renderVehicles() {
    const tbody = document.getElementById('vehicles-tbody');
    if (allVehicles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="p-4 text-center text-gray-400">No hay vehículos</td></tr>';
        return;
    }
    tbody.innerHTML = allVehicles.map(v => `
        <tr class="hover:bg-gray-50">
            <td class="p-4 font-medium">${v.plate_number || '-'}</td>
            <td class="p-4 text-gray-600">${v.model || '-'}</td>
            <td class="p-4">${v.publisher_name || '-'}</td>
            <td class="p-4 text-gray-500 break-all">${v.publisher_email || '-'}</td>
            <td class="p-4"><span class="${v.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} px-2 py-1 rounded-full text-xs font-bold">${(v.status || 'active').toUpperCase()}</span></td>
            <td class="p-4 text-center">${v.qr_count || 0}</td>
            <td class="p-4 text-center">${v.scans_month || 0}</td>
            <td class="p-4 text-right">
                <button onclick="editVehicle(${v.id})" class="text-[#003366] hover:underline text-xs font-medium">Editar</button>
            </td>
        </tr>
    `).join('');
}

function showCreateModal() {
    document.getElementById('create-modal').classList.remove('hidden');
}
function closeCreateModal() {
    document.getElementById('create-modal').classList.add('hidden');
}
function closeEditModal() {
    document.getElementById('edit-modal').classList.add('hidden');
}

document.getElementById('create-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Añadiendo...';
    try {
        await api('admin.vehicles.create', {
            publisher_id: parseInt(document.getElementById('new-publisher').value),
            plate_number: document.getElementById('new-plate').value,
            model: document.getElementById('new-model').value
        });
        closeCreateModal(); this.reset(); loadVehicles();
        toast('Vehículo añadido', 'success');
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Añadir'; }
});

async function editVehicle(id) {
    const v = allVehicles.find(x => x.id === id);
    if (!v) return;
    document.getElementById('edit-id').value = v.id;
    document.getElementById('edit-plate').value = v.plate_number || '';
    document.getElementById('edit-model').value = v.model || '';
    document.getElementById('edit-status').value = v.status || 'active';
    document.getElementById('edit-publisher').value = v.publisher_id || '';
    document.getElementById('edit-modal').classList.remove('hidden');
}

document.getElementById('edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Guardando...';
    try {
        await api('admin.vehicles.update', {
            id: parseInt(document.getElementById('edit-id').value),
            publisher_id: parseInt(document.getElementById('edit-publisher').value) || null,
            plate_number: document.getElementById('edit-plate').value,
            model: document.getElementById('edit-model').value,
            status: document.getElementById('edit-status').value
        });
        closeEditModal(); loadVehicles();
        toast('Vehículo actualizado', 'success');
    } catch (err) { toast(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Guardar'; }
});

load();
</script>
</body>
</html>
