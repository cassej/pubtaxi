<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📊 <span>Dashboard</span>
            </a>
            <a href="users.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                👥 <span>Usuarios</span>
            </a>
            <a href="fleet.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                🚕 <span>Flota</span>
            </a>
            <a href="campaigns.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📢 <span>Campañas</span>
            </a>
            <a href="payouts.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">
                💸 <span>Pagos</span>
            </a>
        </nav>

        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white text-sm font-bold">A</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Admin</p>
                    <p class="text-xs text-gray-500">Administrador</p>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl lg:text-2xl font-bold text-[#003366]">💸 Pagos a Taxistas</h1>
            <button onclick="showCreateModal()" class="bg-[#003366] text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-950 transition">+ Crear Pago</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
            <table class="w-full text-left min-w-[500px]">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold border-b">
                        <th class="p-4">Fecha</th>
                        <th class="p-4">Taxista</th>
                        <th class="p-4">Periodo</th>
                        <th class="p-4">Escaneos</th>
                        <th class="p-4">Monto</th>
                        <th class="p-4">Estado</th>
                    </tr>
                </thead>
                <tbody id="payouts-tbody" class="text-sm divide-y divide-gray-100"></tbody>
            </table>
            <div class="p-4 bg-gray-50 border-t border-gray-100 flex items-center justify-between">
                <p class="text-xs text-gray-500" id="payouts-count">Cargando...</p>
                <div class="flex gap-2">
                    <button id="btn-prev" onclick="pagePrev()" class="px-3 py-1 bg-white border border-gray-200 rounded text-xs hover:bg-gray-50 disabled:opacity-30" disabled>Anterior</button>
                    <button id="btn-next" onclick="pageNext()" class="px-3 py-1 bg-[#003366] text-white rounded text-xs hover:bg-blue-950 disabled:opacity-30" disabled>Siguiente</button>
                </div>
            </div>
        </div>
    </main>

</div>

<div id="create-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-bold text-lg mb-4">Crear Pago</h3>
        <form id="create-form" class="space-y-4">
            <select id="pay-publisher" class="w-full p-3 border rounded-xl text-sm outline-none" required>
                <option value="">Seleccionar taxista</option>
            </select>
            <input type="text" id="pay-period-start" placeholder="Inicio periodo (YYYY-MM-DD)" class="w-full p-3 border rounded-xl text-sm outline-none" required>
            <input type="text" id="pay-period-end" placeholder="Fin periodo (YYYY-MM-DD)" class="w-full p-3 border rounded-xl text-sm outline-none" required>
            <input type="number" id="pay-scans" placeholder="Escaneos" class="w-full p-3 border rounded-xl text-sm outline-none" required>
            <input type="number" step="0.01" id="pay-amount" placeholder="Monto $" class="w-full p-3 border rounded-xl text-sm outline-none" required>
            <div class="flex gap-3">
                <button type="button" onclick="closeCreateModal()" class="flex-1 py-3 border rounded-xl text-sm font-medium">Cancelar</button>
                <button type="submit" class="flex-1 bg-[#003366] text-white py-3 rounded-xl text-sm font-bold">Crear</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../advertiser/js/mobile.js"></script>
<script>
let payoutOffset = 0;
const PAYOUT_LIMIT = 20;

async function loadPayouts() {
    try {
        const data = await api('admin.payouts.list', { offset: payoutOffset, limit: PAYOUT_LIMIT });
        const tbody = document.getElementById('payouts-tbody');
        document.getElementById('payouts-count').textContent = `Mostrando ${Math.min(data.total, PAYOUT_LIMIT)} de ${data.total} registros`;
        document.getElementById('btn-prev').disabled = payoutOffset === 0;
        document.getElementById('btn-next').disabled = payoutOffset + PAYOUT_LIMIT >= data.total;

        if (!data.payouts || data.payouts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-gray-400">No hay pagos registrados</td></tr>';
            return;
        }
        tbody.innerHTML = data.payouts.map(p => `
            <tr class="hover:bg-gray-50">
                <td class="p-4">${p.paid_at ? new Date(p.paid_at).toLocaleDateString('es-PA') : new Date(p.created_at).toLocaleDateString('es-PA')}</td>
                <td class="p-4">${p.publisher_name || p.publisher_email || '—'}</td>
                <td class="p-4 text-gray-500">${p.period_start || '—'} / ${p.period_end || '—'}</td>
                <td class="p-4">${p.scans || 0}</td>
                <td class="p-4 font-bold text-[#003366]">$${Number(p.amount || 0).toFixed(2)}</td>
                <td class="p-4"><span class="${p.status === 'paid' ? 'bg-green-100 text-green-700' : p.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'} px-2 py-1 rounded-full text-xs font-bold">${(p.status || '').toUpperCase()}</span></td>
            </tr>
        `).join('');
    } catch (err) {
        toast(err.message, 'error');
    }
}

async function showCreateModal() {
    try {
        const data = await api('admin.users.list', { role: 'publisher' });
        const select = document.getElementById('pay-publisher');
        select.innerHTML = '<option value="">Seleccionar taxista</option>' +
            (data.users || []).map(u =>
                `<option value="${u.id}">${u.name || u.email}</option>`
            ).join('');
    } catch (err) {
        toast(err.message, 'error');
    }
    document.getElementById('create-modal').classList.remove('hidden');
}

function closeCreateModal() {
    document.getElementById('create-modal').classList.add('hidden');
}

document.getElementById('create-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Creando...';
    try {
        await api('admin.payouts.create', {
            publisher_id: parseInt(document.getElementById('pay-publisher').value),
            period_start: document.getElementById('pay-period-start').value,
            period_end: document.getElementById('pay-period-end').value,
            scans: parseInt(document.getElementById('pay-scans').value),
            amount: parseFloat(document.getElementById('pay-amount').value)
        });
        closeCreateModal();
        this.reset();
        loadPayouts();
        toast('Pago creado', 'success');
    } catch (err) {
        toast(err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Crear';
    }
});

function pagePrev() { if (payoutOffset > 0) { payoutOffset -= PAYOUT_LIMIT; loadPayouts(); } }
function pageNext() { payoutOffset += PAYOUT_LIMIT; loadPayouts(); }

loadPayouts();
</script>
</body>
</html>
