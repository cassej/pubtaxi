<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex items-center justify-center px-4">

<div class="max-w-md w-full">
    <div class="bg-white rounded-3xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#FFB800] rounded-2xl flex items-center justify-center font-bold text-[#003366] text-2xl mx-auto mb-4">P</div>
            <h1 class="text-2xl font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></h1>
            <p class="text-gray-500 mt-2 text-sm">Panel de Control</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Soy</label>
                <select id="role-select" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]">
                    <option value="advertiser">📢 Anunciante (Quiero vender más)</option>
                    <option value="driver">🚕 Taxista (Quiero ingresos extra)</option>
                    <option value="admin">⚙️ Administrador</option>
                </select>
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Correo Electrónico</label>
                <input type="email" required class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="tu@correo.com">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Contraseña</label>
                <input type="password" required class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="••••••••">
            </div>
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-[#003366] focus:ring-[#003366]">
                    <span class="text-gray-600">Recordarme</span>
                </label>
                <a href="#" class="text-[#003366] hover:underline">¿Olvidaste tu contraseña?</a>
            </div>
            <button type="submit" class="w-full bg-[#003366] text-white py-3 rounded-xl font-bold hover:bg-blue-950 transition">Iniciar Sesión</button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            ¿No tienes cuenta? <a href="#" class="text-[#003366] font-semibold hover:underline">Regístrate gratis</a>
        </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">&copy; 2026 pubtaxi.lat - Panamá</p>
</div>

<script src="js/auth.js"></script>
</body>
</html>
