<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex items-center justify-center px-4">

<div class="max-w-md w-full">
    <div class="bg-white rounded-3xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#FFB800] rounded-2xl flex items-center justify-center font-bold text-[#003366] text-2xl mx-auto mb-4">P</div>
            <h1 class="text-2xl font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></h1>
            <p class="text-gray-500 mt-2 text-sm">Panel de Control</p>
        </div>

        <div class="flex mb-6 bg-gray-100 rounded-xl p-1">
            <button id="tab-login" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm">Iniciar Sesión</button>
            <button id="tab-register" class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-800">Registrarse</button>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Correo Electrónico</label>
                <input type="email" required class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="tu@correo.com">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Contraseña</label>
                <input type="password" required class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-[#003366] text-white py-3 rounded-xl font-bold hover:bg-blue-950 transition">
                Iniciar Sesión
            </button>
        </form>

        <form id="registerForm" class="space-y-4 hidden">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Nombre Completo</label>
                <input type="text" id="reg-name" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="Tu nombre">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Correo Electrónico</label>
                <input type="email" id="reg-email" required class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="tu@correo.com">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Contraseña (mín. 6 caracteres)</label>
                <input type="password" id="reg-password" required minlength="6" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="••••••••">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Tipo de Cuenta</label>
                <div class="flex gap-3 mt-1">
                    <label class="flex-1 flex items-center justify-center gap-2 p-3 border border-gray-200 rounded-xl cursor-pointer hover:border-[#003366] has-[:checked]:border-[#003366] has-[:checked]:bg-[#003366]/5">
                        <input type="radio" name="role" value="advertiser" class="accent-[#003366]" checked>
                        <span class="text-sm font-medium">Anunciante</span>
                    </label>
                    <label class="flex-1 flex items-center justify-center gap-2 p-3 border border-gray-200 rounded-xl cursor-pointer hover:border-[#003366] has-[:checked]:border-[#003366] has-[:checked]:bg-[#003366]/5">
                        <input type="radio" name="role" value="publisher" class="accent-[#003366]">
                        <span class="text-sm font-medium">Taxista</span>
                    </label>
                </div>
            </div>
            <button type="submit" class="w-full bg-[#003366] text-white py-3 rounded-xl font-bold hover:bg-blue-950 transition">
                Crear Cuenta
            </button>
        </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">&copy; 2026 pubtaxi.lat - Panamá</p>
</div>

<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
