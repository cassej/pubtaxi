<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Anuncios | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <!-- Mobile Header -->
    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📊 <span>Analítica</span>
            </a>
            <a href="redirects.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">
                🚕 <span>Mis Anuncios</span>
            </a>
            <a href="builder.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📱 <span>Mini-Sitio</span>
            </a>
            <a href="logs.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📋 <span>Logs</span>
            </a>
        </nav>

        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-[#003366] rounded-full flex items-center justify-center text-white text-sm font-bold">T</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Usuario</p>
                    <p class="text-xs text-gray-500">Anunciante</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <h1 class="text-xl lg:text-2xl font-bold text-[#003366] mb-6">🚕 Mis Anuncios</h1>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 lg:p-6 mb-6">
            <div class="flex flex-col sm:flex-row sm:items-center gap-4">
                <label class="text-sm font-medium text-gray-700">Modo de configuración:</label>
                <div class="flex items-center gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="config-mode" value="global" class="w-4 h-4 border-gray-300 text-[#003366] focus:ring-[#003366]">
                        <span class="text-sm text-gray-600">Global</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="config-mode" value="individual" checked class="w-4 h-4 border-gray-300 text-[#003366] focus:ring-[#003366]">
                        <span class="text-sm text-gray-600">Individual</span>
                    </label>
                </div>
            </div>
        </div>

        <div id="global-config" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 lg:p-6 mb-6 hidden">
            <p class="text-sm text-gray-500 mb-4">Configuración para todos los anuncios</p>

            <div class="space-y-4">
                <select id="global-action" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#003366]">
                    <option value="minisite">📱 Mostrar mi Mini-Sitio</option>
                    <option value="direct">🔗 Redirección directa</option>
                </select>

                <div id="global-url-section" class="hidden">
                    <input type="text" id="global-url" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm outline-none focus:border-[#003366]" placeholder="https://..." value="">
                    <p class="text-[10px] text-gray-400 mt-1">URL de destino</p>
                </div>

                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase mb-3">UTM Etiquetas</p>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <div>
                            <input type="text" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#003366]" value="pubtaxi">
                            <p class="text-[10px] text-gray-400 mt-1">utm_source</p>
                        </div>
                        <div>
                            <input type="text" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#003366]" value="taxi-qr">
                            <p class="text-[10px] text-gray-400 mt-1">utm_medium</p>
                        </div>
                        <div>
                            <input type="text" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#003366]" value="promo-global">
                            <p class="text-[10px] text-gray-400 mt-1">utm_campaign</p>
                        </div>
                        <div>
                            <input type="text" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#003366]" value="">
                            <p class="text-[10px] text-gray-400 mt-1">utm_content</p>
                        </div>
                    </div>
                </div>

                <button onclick="toast('Guardado', 'success')" class="bg-[#FFB800] text-[#003366] px-6 py-3 rounded-xl text-sm font-bold hover:shadow-lg transition">Aplicar a Todos</button>
            </div>
        </div>

        <div id="individual-config" class="space-y-6"></div>

    </main>

</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="js/common.js"></script>
<script src="js/mobile.js"></script>
<script>
    setActiveNav('redirects.html');

    function toggleUrlInput(select) {
        const field = select.closest('.space-y-4').querySelector('.url-field');
        field.style.display = select.value === 'direct' ? '' : 'none';
    }

    async function loadVehicles() {
        try {
            const data = await api('vehicle.withAds');
            const container = document.getElementById('individual-config');
            if (!data.vehicles || data.vehicles.length === 0) {
                container.innerHTML = '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center text-gray-400">No tienes vehículos con anuncios activos</div>';
                return;
            }
            container.innerHTML = data.vehicles.map(v => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 lg:p-6" data-vehicle-id="${v.id}" data-campaign-id="${v.campaign_id}" data-qr-id="${v.qr_id}">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="text-2xl">🚕</span>
                        <div>
                            <p class="font-semibold text-gray-800">${v.plate_number || '#' + v.id}</p>
                            <p class="text-xs text-gray-500">${v.model || ''} - ${v.position || ''}</p>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <select class="action-select w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#003366]" onchange="toggleUrlInput(this)">
                            <option value="minisite" ${v.redirect_mode === 'minisite' ? 'selected' : ''}>📱 Mostrar mi Mini-Sitio</option>
                            <option value="direct" ${v.redirect_mode === 'direct' ? 'selected' : ''}>🔗 Redirección directa</option>
                        </select>
                        <div class="url-field" style="${v.redirect_mode === 'direct' ? '' : 'display:none'}">
                            <input type="text" class="url-input w-full p-3 bg-white border border-gray-200 rounded-xl text-sm outline-none focus:border-[#003366]" placeholder="https://..." value="${v.target_url || ''}">
                        </div>
                        <button onclick="saveRedirect(this)" class="w-full bg-[#003366] text-white py-3 rounded-xl text-sm font-bold hover:bg-blue-950 transition">Guardar</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            toast('Error al cargar vehículos: ' + err.message, 'error');
        }
    }

    async function saveRedirect(btn) {
        const container = btn.closest('[data-campaign-id]');
        const campaignId = parseInt(container.dataset.campaignId);
        const redirectMode = container.querySelector('.action-select').value;
        const params = { id: campaignId, redirect_mode: redirectMode };
        if (redirectMode === 'direct') {
            params.target_url = container.querySelector('.url-input').value;
        }

        btn.disabled = true;
        btn.textContent = 'Guardando...';
        try {
            await api('campaign.update', params);
            toast('¡Guardado con éxito!', 'success');
        } catch (err) {
            toast(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Guardar';
        }
    }

    loadVehicles();
</script>
</body>
</html>
