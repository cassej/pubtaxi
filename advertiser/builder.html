<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Sitios | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📊 <span>Analítica</span>
            </a>
            <a href="redirects.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                🚕 <span>Mis Anuncios</span>
            </a>
            <a href="builder.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">
                📱 <span>Mini-Sitio</span>
            </a>
            <a href="logs.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📋 <span>Logs</span>
            </a>
        </nav>
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-[#003366] rounded-full flex items-center justify-center text-white text-sm font-bold">T</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Usuario</p>
                    <p class="text-xs text-gray-500">Anunciante</p>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl lg:text-2xl font-bold text-[#003366]">📱 Mis Mini-Sitios</h1>
            <a href="builder-edit.html" class="bg-[#003366] text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-950 transition">+ Nuevo</a>
        </div>

        <div id="minisite-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <p class="text-sm text-gray-400 col-span-full text-center py-12">Cargando...</p>
        </div>
    </main>

</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="js/common.js"></script>
<script src="js/mobile.js"></script>
<script>
setActiveNav('builder.html');

let minisites = [];

function renderMinisiteList() {
    const container = document.getElementById('minisite-list');
    if (minisites.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-400 col-span-full text-center py-12">No tienes mini-sitios. Crea uno nuevo.</p>';
        return;
    }
    container.innerHTML = minisites.map(m => `
        <a href="builder-edit.html?id=${m.id}" class="block bg-white rounded-2xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition">
            <div class="flex items-center justify-between mb-3">
                <div class="w-10 h-10 bg-[#003366]/10 rounded-xl flex items-center justify-center text-lg">📱</div>
                <button onclick="event.preventDefault(); event.stopPropagation(); deleteMinisite(${m.id})" class="text-red-400 hover:text-red-600 text-xs font-medium px-2 py-1 rounded-lg hover:bg-red-50">Eliminar</button>
            </div>
            <p class="font-semibold text-gray-800 text-sm">${m.title || 'Sin título'}</p>
            <p class="text-[11px] text-gray-400 mt-1">Creado ${new Date(m.created_at).toLocaleDateString('es-PA')}</p>
        </a>
    `).join('');
}

async function loadMinisites() {
    try {
        const data = await api('advertiser.minisite.list');
        minisites = data.minisites || [];
        renderMinisiteList();
    } catch (err) {
        toast('Error al cargar mini-sitios: ' + err.message, 'error');
    }
}

async function deleteMinisite(id) {
    if (!confirm('¿Eliminar este mini-sitio?')) return;
    try {
        await api('advertiser.minisite.delete', { id });
        toast('Mini-sitio eliminado', 'success');
        await loadMinisites();
    } catch (err) {
        toast(err.message, 'error');
    }
}

loadMinisites();
</script>
</body>
</html>
