<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Ganancias | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900">

<div class="flex min-h-screen">

    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
            <span class="text-base font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
        </div>
        <button id="menu-toggle" class="p-2 rounded-lg hover:bg-gray-100">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white shadow-sm transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FFB800] rounded-md flex items-center justify-center font-bold text-[#003366]">P</div>
                <span class="text-lg font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></span>
            </div>
            <button id="menu-close" class="lg:hidden p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav class="p-4 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium bg-[#003366]/10 text-[#003366] border-l-4 border-[#003366]">
                💰 <span>Ganancias</span>
            </a>
            <a href="vehicles.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                🚕 <span>Mis Vehículos</span>
            </a>
            <a href="payouts.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📄 <span>Historial de Pagos</span>
            </a>
            <a href="logs.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                📋 <span>Logs</span>
            </a>
        </nav>

        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-4 py-2">
                <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white text-sm font-bold">U</div>
                <div>
                    <p class="text-sm font-semibold text-gray-800 sidebar-user-name">Usuario</p>
                    <p class="text-xs text-gray-500">Taxista</p>
                </div>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 lg:ml-64 p-4 lg:p-8 pt-20 lg:pt-8">
        <h1 class="text-xl lg:text-2xl font-bold text-[#003366] mb-6">💰 Mis Ganancias</h1>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 lg:gap-6 mb-6 lg:mb-8">
            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">Ganado Hoy</p>
                <p class="text-3xl lg:text-4xl font-bold text-green-600 mt-2" id="today-earnings">$0</p>
                <p class="text-xs text-gray-500 mt-2" id="today-scans">0 escaneos</p>
            </div>
            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">Este Mes</p>
                <p class="text-3xl lg:text-4xl font-bold text-[#003366] mt-2" id="month-earnings">$0</p>
                <p class="text-xs text-gray-500 mt-2" id="month-scans">0 escaneos</p>
            </div>
            <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">Por Pagar</p>
                <p class="text-3xl lg:text-4xl font-bold text-[#FFB800] mt-2" id="pending-earnings">$0</p>
                <p class="text-xs text-gray-500 mt-2" id="next-payout">Próximo pago: —</p>
            </div>
        </div>

        <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100 mb-6 lg:mb-8">
            <h3 class="font-bold text-gray-700 mb-4 text-sm lg:text-base">Ganancias por Semana</h3>
            <div class="h-48 lg:h-64">
                <canvas id="earningsChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-4 lg:p-6 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-700 mb-4 text-sm lg:text-base">Rendimiento por Vehículo</h3>
            <div class="space-y-4" id="vehicle-perf"></div>
        </div>

    </main>

</div>

<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../advertiser/js/mobile.js"></script>
<script>
async function init() {
    try {
        const data = await api('driver.stats');

        document.getElementById('today-earnings').textContent = formatCurrency(data.todayEarnings);
        document.getElementById('today-scans').textContent = `${data.todayScans} escaneos`;
        document.getElementById('month-earnings').textContent = formatCurrency(data.monthEarnings);
        document.getElementById('month-scans').textContent = `${data.monthScans} escaneos`;
        document.getElementById('pending-earnings').textContent = formatCurrency(data.pendingAmount);

        const weeklyLabels = data.weeklyEarnings.map((w, i) => `Sem ${i + 1}`);
        const weeklyData = data.weeklyEarnings.map(w => w.earnings);

        new Chart(document.getElementById('earningsChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: weeklyLabels.length ? weeklyLabels : ['Sin datos'],
                datasets: [{
                    label: 'Ganancias ($)',
                    data: weeklyData.length ? weeklyData : [0],
                    backgroundColor: '#003366',
                    borderRadius: 6
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const perfContainer = document.getElementById('vehicle-perf');
        if (data.vehicles && data.vehicles.length > 0) {
            perfContainer.innerHTML = data.vehicles.map(v => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                    <div>
                        <p class="font-semibold text-sm">${v.plate_number || '#' + v.id} (${v.model || '—'})</p>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-center">
                            <p class="text-xs text-gray-400">Escaneos</p>
                            <p class="font-bold text-[#003366]">${v.scans_month || 0}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-xs text-gray-400">Ganado</p>
                            <p class="font-bold text-green-600">${formatCurrency((v.scans_month || 0) * 2.5)}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            perfContainer.innerHTML = '<p class="text-sm text-gray-500 p-4">No hay vehículos activos</p>';
        }
    } catch (err) {
        console.error('Error loading driver stats:', err);
    }
}
init();
</script>
</body>
</html>
