<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña | pubtaxi.lat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; } h1, h2, h3 { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex items-center justify-center px-4">

<div class="max-w-md w-full">
    <div class="bg-white rounded-3xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#FFB800] rounded-2xl flex items-center justify-center font-bold text-[#003366] text-2xl mx-auto mb-4">P</div>
            <h1 class="text-2xl font-bold text-[#003366]">pubtaxi<span class="text-[#FFB800]">.lat</span></h1>
            <p class="text-gray-500 mt-2 text-sm">Cambiar Contraseña</p>
        </div>

        <form id="passwordForm" class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Contraseña Actual</label>
                <input type="password" id="current-password" required class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="••••••••">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Nueva Contraseña (mín. 6 caracteres)</label>
                <input type="password" id="new-password" required minlength="6" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="••••••••">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Confirmar Nueva Contraseña</label>
                <input type="password" id="confirm-password" required minlength="6" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#003366]" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-[#003366] text-white py-3 rounded-xl font-bold hover:bg-blue-950 transition">
                Guardar Cambios
            </button>
            <a href="#" id="btn-back" class="block text-center text-sm text-gray-500 hover:text-[#003366] transition font-medium">← Volver</a>
        </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">&copy; 2026 pubtaxi.lat - Panamá</p>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
const btn = document.getElementById('btn-back');
const user = getUser();
if (user) {
    const backMap = {
        admin: '/admin/',
        advertiser: '/advertiser/',
        publisher: '/driver/'
    };
    btn.href = backMap[user.role] || '/';
}

document.getElementById('passwordForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const current = document.getElementById('current-password').value;
    const newPass = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (newPass !== confirm) {
        toast('Las contraseñas no coinciden', 'error');
        return;
    }

    const submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.disabled = true; submitBtn.textContent = 'Guardando...';

    try {
        await api('auth.changePassword', {
            current_password: current,
            new_password: newPass
        });
        toast('Contraseña actualizada', 'success');
        this.reset();
    } catch (err) {
        toast(err.message, 'error');
    } finally {
        submitBtn.disabled = false; submitBtn.textContent = 'Guardar Cambios';
    }
});
</script>
</body>
</html>
